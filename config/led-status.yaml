# RGB status LED handler for the ESP32-S3 controller.
# Manages visual feedback for boot sequence, WiFi state, filter warnings, and level indicators.

esphome:
  on_boot:
    - priority: 375.0
      then:
        # RGB status LED boot sequence
        - script.execute: show_led_status

wifi:
  on_connect:
    then:
      - script.execute: on_wifi_connect
  on_disconnect:
    then:
      - script.execute: show_led_status

light:
  - platform: esp32_rmt_led_strip
    id: rgb_status_led
    name: RGB Status LED
    icon: "mdi:led-on"
    restore_mode: ALWAYS_OFF
    rgb_order: GRB
    pin: GPIO2
    num_leds: 1
    chipset: ws2812
    use_psram: true
    rmt_symbols: 144
    gamma_correct: 1
    color_correct: [10%, 10%, 10%] # Reduce brightness to 10%
    default_transition_length: 1s
    effects:
      - lambda:
          name: pulse
          update_interval: 250ms
          lambda: |-
            static bool on_ = true;
            auto call = id(rgb_status_led).make_call();
            
            call.set_state(true);
            call.set_brightness(on_ ? 1.0 : 0);
            call.set_transition_length(250);
            on_ = !on_;
            
            // don't tell HA every change
            call.set_publish(false);
            call.set_save(false);
            call.perform();

script:
  - id: indicate_level
    mode: restart
    parameters:
      pulses: int
    then:
      - script.stop: show_led_status
      - script.stop: on_wifi_connect
      - logger.log: "LED: Level indicator - BLUE fast pulse"
      - light.turn_on:
          id: rgb_status_led
          effect: pulse
          red: 0%
          green: 0%
          blue: 100%
      - delay: !lambda "return pulses * 500;"
      - script.execute: show_led_status

  - id: show_led_status
    mode: restart
    then:
      - script.stop: indicate_level
      - script.stop: on_wifi_connect
      - if:
          condition:
            - lambda: return !id(wifi_id).is_connected() && !id(wifi_id).is_ap_active();
          then:
            - logger.log: "LED: WiFi disconnected & AP inactive - RED fast pulse"
            - light.turn_on:
                id: rgb_status_led
                effect: pulse
                red: 100%
                green: 0%
                blue: 0%
            - wait_until:
                condition:
                  - lambda: return id(wifi_id).is_ap_active();
            - script.execute: show_led_status
          else:
            - if:
                condition:
                  - lambda: return id(wifi_id).is_ap_active();
                then:
                  - logger.log: "LED: AP active - YELLOW fast pulse"
                  - light.turn_on:
                      id: rgb_status_led
                      effect: pulse
                      red: 100%
                      green: 100%
                      blue: 0%
                  - wait_until:
                      condition:
                        - lambda: return !id(wifi_id).is_ap_active();
                  - script.execute: show_led_status
                else:
                  - if:
                      condition:
                        - lambda: return id(filter_status).state == "Full" || id(filter_status).state == "full";
                      then:
                        - delay: 1s
                        - logger.log: "LED: Filter full - PURPLE slow pulse"
                        - light.turn_on:
                            id: rgb_status_led
                            effect: none
                            red: 65%
                            green: 0%
                            blue: 100%
                      else:
                        - delay: 1s
                        - logger.log: "LED: Normal status - Off"
                        - light.turn_off:
                            id: rgb_status_led
                            transition_length: 250ms

  - id: on_wifi_connect
    mode: restart
    then:
      - script.stop: show_led_status
      - script.stop: indicate_level
      - logger.log: "LED: WiFi connected - GREEN light for 10s"
      - light.turn_on:
          id: rgb_status_led
          effect: none
          red: 0%
          green: 100%
          blue: 0%
      - delay: 10s
      - script.execute: show_led_status
